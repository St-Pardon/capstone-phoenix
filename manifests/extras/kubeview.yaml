# KubeView (benc-uk) — cluster visualizer. PERSONAL BONUS, not part of the GitOps app.
# Deliberately NOT in manifests/base/kustomization.yaml, so Argo doesn't manage it — apply by hand,
# screenshot the cluster map for docs/EVIDENCE/, then `kubectl delete -f` when done.
#
#   kubectl apply -f manifests/extras/kubeview.yaml
#   kubectl -n kubeview rollout status deploy/kubeview
#   kubectl -n kubeview port-forward svc/kubeview 8000:80     # then open http://localhost:8000
#
# Image is multi-arch (amd64+arm64), so it runs on the Ampere A1 nodes. Pinned tag, never :latest.
apiVersion: v1
kind: Namespace
metadata:
  name: kubeview
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeview
  namespace: kubeview
---
# Read-only across the cluster — mirrors the upstream chart's permissions so the graph renders fully.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeview-readonly
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - namespaces
      - nodes
      - configmaps
      - secrets
      - endpoints
      - events
      - persistentvolumeclaims
      - replicationcontrollers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeview-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubeview-readonly
subjects:
  - kind: ServiceAccount
    name: kubeview
    namespace: kubeview
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeview
  namespace: kubeview
  labels:
    app.kubernetes.io/name: kubeview
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubeview
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubeview
    spec:
      serviceAccountName: kubeview
      containers:
        - name: kubeview
          image: ghcr.io/benc-uk/kubeview:2.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: kubeview
  namespace: kubeview
  labels:
    app.kubernetes.io/name: kubeview
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kubeview
  ports:
    - name: http
      port: 80
      targetPort: http
