apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Pin image tags here — NEVER :latest. Replace the newTag values with the commit SHA / semver
# your CI publishes to GHCR (the CI-bumps-this-tag flow is the brief's stretch goal).
images:
  - name: ghcr.io/ts-a-devops/taskapp-backend
    newTag: 5d6b8fc
  - name: ghcr.io/ts-a-devops/taskapp-frontend
    newTag: 26da2b0

# Environment knobs — set your real domain and ACME email here.
patches:
  - target:
      kind: Ingress
      name: taskapp
    patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: onyedikachi-capston.st-pardon.com
      - op: replace
        path: /spec/rules/0/host
        value: onyedikachi-capston.st-pardon.com
      # Second host: expose the backend directly at api.st-pardon.com (its own TLS cert).
      # Frontend stays same-origin on the host above, so no CORS is involved.
      - op: add
        path: /spec/rules/-
        value:
          host: api.st-pardon.com
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: taskapp-backend
                    port:
                      number: 5000
      - op: add
        path: /spec/tls/-
        value:
          hosts:
            - api.st-pardon.com
          secretName: taskapp-api-tls
  - target:
      kind: Issuer
      name: letsencrypt-prod
    patch: |-
      - op: replace
        path: /spec/acme/email
        value: d_pardon@live.com
