# Headless service — gives the StatefulSet a stable DNS name (taskapp-postgres) that the
# backend connects to. clusterIP: None so it resolves straight to the pod.
apiVersion: v1
kind: Service
metadata:
  name: taskapp-postgres
  labels:
    app.kubernetes.io/name: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
