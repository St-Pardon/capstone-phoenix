# Base = same-origin routing on ONE host: / -> frontend, /api -> backend. One TLS cert, no CORS.
# cert-manager fills the taskapp-tls secret from the Issuer via an HTTP-01 challenge.
# Host is a placeholder — overlays/prod patches it to onyedikachi-capston.st-pardon.com AND adds
# a second host api.st-pardon.com -> backend (with its own taskapp-api-tls cert).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp
  annotations:
    cert-manager.io/issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - taskapp.example.com
      secretName: taskapp-tls
  rules:
    - host: taskapp.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: taskapp-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskapp-frontend
                port:
                  number: 80
