# Namespaced Issuer (not ClusterIssuer) — keeps everything in the taskapp namespace and avoids
# the kustomize namespace-transformer clash with a cluster-scoped resource. HTTP-01 solver over
# ingress-nginx on port 80. Email is a placeholder — overlays/prod patches it.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
            # The allow-acme-solver-from-ingress NetworkPolicy selects part-of=taskapp (kustomize
            # commonLabels injects it into the selector). cert-manager's solver pod isn't built by
            # kustomize, so stamp the label here or default-deny blocks ingress-nginx → 502.
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/part-of: taskapp
