# TEMPLATE ONLY — the secret half of the old `.env`. This file documents the shape; it is NOT
# referenced by kustomization.yaml so GitOps never needs real secrets in git.
#
# Apply the REAL secret out-of-band, once, before deploying (it is gitignored by *secret*.yaml):
#   cp secret.example.yaml secret.yaml   # then fill real values
#   kubectl apply -n taskapp -f secret.yaml
#
# Upgrade path (brief stretch): Sealed Secrets / External Secrets so it CAN live in git.
apiVersion: v1
kind: Secret
metadata:
  name: taskapp-secret
type: Opaque
stringData:
  POSTGRES_USER: taskapp
  POSTGRES_PASSWORD: CHANGE_ME
  SECRET_KEY: CHANGE_ME
  DATABASE_URL: postgresql://taskapp:CHANGE_ME@taskapp-postgres:5432/taskapp
