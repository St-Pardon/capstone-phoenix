# Non-secret config — the committed half of the old `.env`. Safe to live in git/GitOps.
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskapp-config
  annotations:
    # Must exist before the Postgres StatefulSet and the migrate hook consume it.
    argocd.argoproj.io/sync-wave: "-3"
data:
  # POSTGRES_* are consumed by the postgres:16-alpine image to initialize the DB.
  POSTGRES_DB: taskapp
  POSTGRES_HOST: taskapp-postgres
  POSTGRES_PORT: "5432"
  FLASK_ENV: production
  # DATABASE_* are what the app + alembic actually read (migrations/env.py get_database_url()).
  # Without all of these set, the app falls back to a hardcoded localhost URL.
  DATABASE_HOST: taskapp-postgres
  DATABASE_PORT: "5432"
  DATABASE_NAME: taskapp
