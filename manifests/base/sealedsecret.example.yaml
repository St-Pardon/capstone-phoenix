# EXAMPLE shape of the encrypted Secret. The REAL one is produced by `seal-secret.sh` (kubeseal)
# and IS safe to commit — encryptedData is sealed with the cluster controller's public key and can
# only be decrypted in-cluster. Once you generate manifests/base/taskapp-sealedsecret.yaml, add it
# to base/kustomization.yaml `resources:` and drop the out-of-band Secret step in the RUNBOOK.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: taskapp-secret
  namespace: taskapp
spec:
  encryptedData:
    POSTGRES_USER: AgB...<sealed>...==
    POSTGRES_PASSWORD: AgB...<sealed>...==
    SECRET_KEY: AgB...<sealed>...==
    DATABASE_URL: AgB...<sealed>...==
  template:
    metadata:
      name: taskapp-secret
      namespace: taskapp
    type: Opaque
