# TEMPLATE ONLY — the S3 (OCI Object Storage) credentials for the backup CronJob.
# Seal the REAL values, never commit them plaintext (it is gitignored by *secret*.yaml / *.example
# is the documented shape). Produce the committable SealedSecret with:
#   cp manifests/base/pg-backup-s3.example.yaml /tmp/pg-backup-s3.yaml   # fill real values
#   manifests/seal-secret.sh /tmp/pg-backup-s3.yaml manifests/base/pg-backup-s3-sealedsecret.yaml
