# Nightly Postgres backup -> OCI Object Storage (S3-compat).
# One non-root container on postgres:16-alpine: pg_dump | gzip, then upload with a pinned `mc`
# static binary (MinIO client speaks OCI's S3-compat API cleanly — no aws-chunked 501). DB creds
# come from the same SealedSecret the app uses (taskapp-secret); the S3 creds are their own
# SealedSecret (pg-backup-s3). Trigger on demand with:
#   kubectl -n taskapp create job --from=cronjob/taskapp-pg-backup pg-backup-manual
apiVersion: batch/v1
kind: CronJob
metadata:
  name: taskapp-pg-backup
  labels:
    app.kubernetes.io/name: backup
spec:
  schedule: "0 2 * * *"          # 02:00 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  set -o pipefail          # else a failed pg_dump in `pg_dump | gzip` still exits 0
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  FILE="taskapp-${TS}.sql.gz"
                  # A fresh ephemeral pod can RACE the CNI (kube-router) programming this pod's IP
                  # into the NetworkPolicy allow-set, so its first seconds to postgres get refused.
                  # Wait (retry ~60s) instead of dumping into the void.
                  echo "waiting for ${POSTGRES_HOST}:5432 (CNI may lag for a fresh pod) ..."
                  i=1
                  while ! pg_isready -h "$POSTGRES_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" >/dev/null 2>&1; do
                    if [ "$i" -ge 30 ]; then
                      echo "ERROR: ${POSTGRES_HOST}:5432 unreachable after ~60s — aborting (no upload)"; exit 1
                    fi
                    i=$((i+1)); sleep 2
                  done
                  echo "postgres reachable; dumping $POSTGRES_DB ..."
                  PGPASSWORD="$POSTGRES_PASSWORD" pg_dump -h "$POSTGRES_HOST" -U "$POSTGRES_USER" \
                    -d "$POSTGRES_DB" --no-owner --no-privileges | gzip -9 > "/tmp/$FILE"
                  SIZE=$(wc -c < "/tmp/$FILE")
                  echo "dump size: ${SIZE} bytes"
                  # Guard: an empty gzip is ~20 bytes — never upload a dud.
                  if [ "$SIZE" -lt 200 ]; then
                    echo "ERROR: dump only ${SIZE} bytes — refusing to upload"; exit 1
                  fi
                  case "$(uname -m)" in aarch64) M=arm64;; x86_64) M=amd64;; *) M=amd64;; esac
                  wget -qO /tmp/mc \
                    "https://dl.min.io/client/mc/release/linux-${M}/archive/mc.${MC_RELEASE}"
                  chmod +x /tmp/mc
                  /tmp/mc --config-dir /tmp/mc-cfg alias set oci \
                    "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
                  /tmp/mc --config-dir /tmp/mc-cfg cp "/tmp/$FILE" "oci/${S3_BUCKET}/${FILE}"
                  echo "uploaded ${FILE} -> ${S3_BUCKET}"
              env:
                - name: MC_RELEASE
                  value: "RELEASE.2025-08-13T08-35-41Z"   # pinned mc client (no :latest)
              envFrom:
                - configMapRef:
                    name: taskapp-config          # POSTGRES_HOST / POSTGRES_DB
                - secretRef:
                    name: taskapp-secret          # POSTGRES_USER / POSTGRES_PASSWORD
                - secretRef:
                    name: pg-backup-s3            # S3_ENDPOINT / S3_BUCKET / S3_ACCESS_KEY / S3_SECRET_KEY
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 300m
                  memory: 192Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
