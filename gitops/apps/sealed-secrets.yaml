# Platform: Sealed Secrets controller. sync-wave -2 so it's running before the taskapp app's
# SealedSecret syncs (the controller decrypts it in-cluster into the real taskapp-secret Secret).
# Installed into kube-system with the conventional name so `kubeseal` finds it by default.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: phoenix
  source:
    # bitnami-labs.github.io stopped serving index.yaml (404); the chart now lives on this host.
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.19.0   # verified 2026-06-28 against bitnami.github.io/sealed-secrets index
    helm:
      values: |
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
